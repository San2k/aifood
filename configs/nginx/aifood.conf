# Nginx configuration for AiFood Label Recognition API
# Location: /etc/nginx/sites-available/aifood.conf
# Symlink: ln -s /etc/nginx/sites-available/aifood.conf /etc/nginx/sites-enabled/

upstream agent_api {
    server localhost:8000;
}

upstream ocr_service {
    server localhost:8001;
}

server {
    listen 80;
    server_name aifood.example.com;  # Replace with your domain

    # Increase timeouts for OCR processing
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Agent API endpoints
    location /api/ {
        proxy_pass http://agent_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # OCR Service endpoints (optional, for direct access)
    location /ocr/ {
        proxy_pass http://ocr_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Longer timeout for OCR processing
        proxy_read_timeout 90s;
    }

    # Health check (no auth required)
    location /health {
        proxy_pass http://agent_api/health;
        access_log off;
    }

    # Docs
    location /docs {
        proxy_pass http://agent_api/docs;
    }

    # Deny access to sensitive endpoints
    location /v1/admin {
        deny all;
        return 403;
    }

    # Logging
    access_log /var/log/nginx/aifood_access.log;
    error_log /var/log/nginx/aifood_error.log;
}

