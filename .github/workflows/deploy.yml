name: Deploy to Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'

  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all services'
        required: false
        default: 'false'
        type: boolean

env:
  DEPLOY_PATH: /opt/aifood

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          PLUGIN_CHANGED=false
          DOCKER_CHANGED=false

          if echo "$CHANGED_FILES" | grep -q "^aifood-plugin/"; then
            PLUGIN_CHANGED=true
          fi

          if echo "$CHANGED_FILES" | grep -qE "^(docker-compose|services/)"; then
            DOCKER_CHANGED=true
          fi

          echo "plugin_changed=$PLUGIN_CHANGED" >> $GITHUB_OUTPUT
          echo "docker_changed=$DOCKER_CHANGED" >> $GITHUB_OUTPUT
          echo "Changed: $CHANGED_FILES"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Code synced"

      - name: Rebuild Plugin
        if: steps.changes.outputs.plugin_changed == 'true' || github.event.inputs.force_rebuild == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}/aifood-plugin

            echo "=== Rebuilding AiFood Plugin ==="
            npm install
            npm run build

            rm -rf /root/.openclaw/extensions/aifood
            openclaw plugins install .
            systemctl restart openclaw-gateway

            echo "✅ Plugin rebuilt and OpenClaw restarted"

      - name: Rebuild Docker Services
        if: steps.changes.outputs.docker_changed == 'true' || github.event.inputs.force_rebuild == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            echo "=== Rebuilding Docker Services ==="
            docker compose --env-file .env build
            docker compose --env-file .env up -d

            echo "✅ Docker services updated"

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            sleep 5
            echo "=== Health Check ==="

            curl -sf http://localhost:9000/health && echo " - LLM Gateway: ✅" || echo " - LLM Gateway: ❌"
            curl -sf http://localhost:8000/health && echo " - Agent API: ✅" || echo " - Agent API: ❌"
            curl -sf http://localhost:8001/health && echo " - OCR Service: ✅" || echo " - OCR Service: ❌"
            systemctl is-active --quiet openclaw-gateway && echo " - OpenClaw: ✅" || echo " - OpenClaw: ❌"

            echo "=== Deploy Complete ==="
