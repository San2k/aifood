version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aifood-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aifood
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aifood_secure_password_2024}
      POSTGRES_DB: aifood
    volumes:
      - aifood_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Use 5433 to avoid conflict with other postgres instances
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aifood -d aifood"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aifood-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - aifood_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ocr-service:
    build:
      context: ./services/ocr-service
      dockerfile: Dockerfile
    container_name: aifood-ocr-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  llm-gateway:
    build:
      context: ./services/llm-gateway
      dockerfile: Dockerfile
    container_name: aifood-llm-gateway
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      GATEWAY_PORT: 9000
      GATEWAY_HOST: 0.0.0.0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
      GEMINI_MODEL: gemini-3-flash-preview
      GEMINI_MODEL_PRO: gemini-3-flash-preview
      GEMINI_TIMEOUT: 60000
      GEMINI_RETRIES: 3
      REDIS_URL: redis://redis:6379/1
      HISTORY_WINDOW_TOKENS: 12000
      HISTORY_WINDOW_MESSAGES: 8
      SUMMARY_TRIGGER_TOKENS: 12000
      SUMMARY_TARGET_TOKENS: 1000
      RAG_BUDGET_TOKENS: 2000
      CACHE_ENABLED: "true"
      CACHE_TTL: 3600
      QUOTA_DAILY_TOKENS: 100000
      QUOTA_MONTHLY_USD: 50
      LOG_LEVEL: info
      METRICS_ENABLED: "false"
      TRACING_ENABLED: "false"
    depends_on:
      - redis
    volumes:
      - ./services/llm-gateway/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:9000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  agent-api:
    build:
      context: ./services/agent-api
      dockerfile: Dockerfile
    container_name: aifood-agent-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://aifood:${POSTGRES_PASSWORD:-aifood_secure_password_2024}@postgres:5432/aifood
      REDIS_URL: redis://redis:6379/0
      OCR_SERVICE_URL: http://ocr-service:8001
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PYTHONUNBUFFERED: "1"
    depends_on:
      - postgres
      - redis
      - ocr-service
    volumes:
      - /tmp/aifood:/tmp/aifood
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  aifood_postgres_data:
    driver: local
  aifood_redis_data:
    driver: local
